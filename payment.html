<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="m-0 font-sm">
    <div>
        <header>
             <div class="grid border border-transparent bg-red-100 gap-4 m-10">
                <div>
                    <h2 class="text-amber-700">Terms and Conditions</h2>
                    <p>Pay the deposit of 15% of the total monthy payment. <br>
                        Money ones sent is not refundable. <br>
                        A credit of 5% of the total monthly pay from the landload <br>
                        for the connected tenants.
                    </p>
                </div>
            <h2>Make payments</h2>
            <form class="border border-transparent  rounded m-4">
                <input type="text" placeholder="Full Name"required> <br>
                <input type="email" placeholder="Email" required> <br>
                <input type="number" placeholder="Amount (ksh)"required>
                <select class="grid">
                    <option value="payment method"></option>
                    <option value="m-pesa">M-pesa</option>
                    <option value="card">Credit card</option>
                </select> <br>
                <button class="border p-2 border-transparent text-white rounded-md bg-blue-700"><a href="index.html">Pay Now</a></button>
            </form>
        </div>
        </header>
    </div>
    
</body>
</html>
