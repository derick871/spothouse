<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <div>
        <h2 class="text-white bg-blue-600 py-2 px-3 m-4">Personal information</h2>
        <form class=" m-4 gap-4 w-full">
            <label>Name</label>
            <input type=" Full name"placeholder class="border border-black w-1/2"> <br>
            <label>Email</label>
            <input type="Email"placeholder class="border border-black w-1/2"> <br>
            <label>Phone</label>
            <input type="Phone"placeholder class="border border-black w-1/2"> <br>
            <label>Date of Birth</label>
            <input type="Date of Birth" placeholder class="border border-black w-1/2"> <br>
            <label>Social Security Number</label>
            <input type="Social security number"placeholder class="border border-black w-1/2">
        </form>
    </div>
    <div>
        <h2 class="text-white bg-blue-600 py-2 px-3 m-4">Current Address</h2>
        <form class=" m-4 gap-4 w-full">
            <label> Address</label>
            <input type=" Address"placeholder class="border border-black w-1/2"> <br>
            <label>City/Estate</label>
            <input type="City"placeholder class="border border-black w-1/2"> <br>
            <label>Property Manager's Name</label>
            <input type="Property manager's name  "placeholder class="border border-black w-1/2"> <br>
            <label>Property Manager's phone number </label>
            <input type="Property manager's Phone nunber"placeholder class="border border-black w-1/2"> <br>
            <label>Social Security number</label>
            <input type="Social security number"placeholder class="border border-black w-1/2"> <br>
            <label>Monthly rent</label>
            <input type="Monthly rent"placeholder class="border border-black w-1/2">
        </form class=" m-4 gap-4 w-full" >
    </div>
    <div>
        <h2 class="text-white bg-blue-600 py-2 px-3 m-4">Employment Informaation</h2>
        <form class=" m-4 gap-10 w-full">
            <label>Current Employer</label>
            <input type="Current employer" placeholder class="border border-black gap-4"> <br>
            <label>Job Title</label>
            <input type="Job tittle"placeholder class="border border-black w-1/2"> <br>
            <label>Employment date start</label>
            <input type="Employment date start"placeholder class="border border-black w-1/2"> <br>
            <label>Supervisor's name</label>
            <input type="Supervisor's name"placeholder class="border border-black w-1/2"> <br>
            <label>Supervisor's</label>
            <input type="Supervisor's Number"placeholder class="border border-black w-1/2">
        </form>
    </div>
    
</body>
</html>
